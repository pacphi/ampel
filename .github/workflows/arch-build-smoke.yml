name: Arch Build Smoke Test

# Validates that the Docker images build for linux/arm64 on a NATIVE arm64
# runner (ubuntu-24.04-arm — free for public repos) WITHOUT pushing anything.
# This mirrors how the Release workflow now builds arm64 (no QEMU emulation)
# and is the quickest way to confirm the Dockerfiles build natively on arm64.
#
# Run on demand: gh workflow run arch-build-smoke.yml --ref <branch>
on:
  workflow_dispatch:

concurrency:
  group: arch-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  arch-build:
    name: Build ${{ matrix.image }} (native linux/arm64)
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: docker/Dockerfile.api
            image: api
          - dockerfile: docker/Dockerfile.worker
            image: worker
          - dockerfile: docker/Dockerfile.frontend
            image: frontend
            build_args: VITE_API_URL=/api

    steps:
      - uses: actions/checkout@v6

      # No QEMU: the runner is arm64, so linux/arm64 builds natively.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }} for linux/arm64 (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: false
          tags: ampel-${{ matrix.image }}:smoke
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=smoke-${{ matrix.image }}-arm64
          cache-to: type=gha,mode=max,scope=smoke-${{ matrix.image }}-arm64
