name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
# Never cancel runs on the protected branches.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  PNPM_VERSION: 11.1.3
  # NOTE: keep in sync with rust-toolchain.toml (the canonical pin for local dev).
  RUST_VERSION: "1.95.0"
  # CI build hygiene (see corrode.dev "faster CI builds"):
  #  - incremental compilation only adds dependency-tracking overhead on clean runners
  #  - dropping debuginfo shrinks target/ dramatically (this is what previously
  #    blew the runner disk during instrumented coverage builds)
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
  # Test environment configuration
  CI_MODE: "true"
  RUST_LOG: "warn"

jobs:
  # ============================================
  # Backend Validation & Linting
  # ============================================
  backend-lint:
    name: Backend Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "lint"

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::all

      - name: Check for unused dependencies (advisory)
        run: cargo machete || echo "::warning::cargo-machete found potentially unused dependencies (non-blocking)"

  # ============================================
  # Backend Security Checks (BLOCKING)
  # cargo-audit + cargo-deny gate the build. Known, unfixable transitive
  # advisories are documented in deny.toml's ignore list, so any NEW advisory
  # fails CI.
  # ============================================
  backend-security:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install audit tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Run security audit (vulnerabilities)
        run: cargo audit

      - name: Check advisories, licenses, bans and sources
        run: cargo deny check

  # ============================================
  # Backend Build — build once, test many.
  # Produces a cargo-nextest archive that the unit and integration test
  # jobs consume WITHOUT recompiling. This is the single workspace compile
  # per CI run (https://nexte.st/docs/ci-features/archiving/).
  # ============================================
  backend-build-archive:
    name: Backend Build (test archive)
    runs-on: ubuntu-latest
    # Intentionally NOT gated on backend-lint: the build and the lint compile
    # the workspace independently, so running them in series doubles the
    # critical path. They run in parallel; ci-success still requires both.
    env:
      # Use lld for faster linking of the dependency-heavy workspace.
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v6

      - name: Install lld
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "build"
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Build and archive tests
        run: |
          cargo nextest archive \
            --workspace \
            --all-features \
            --locked \
            --archive-file nextest-archive.tar.zst

      - name: Upload test archive
        uses: actions/upload-artifact@v7
        with:
          name: nextest-archive
          path: nextest-archive.tar.zst
          retention-days: 1

  # ============================================
  # Backend Unit Tests (SQLite In-Memory)
  # Runs from the prebuilt archive — no recompilation.
  # ============================================
  backend-unit-test:
    name: Backend Unit Tests (SQLite)
    runs-on: ubuntu-latest
    needs: [backend-build-archive]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Download test archive
        uses: actions/download-artifact@v7
        with:
          name: nextest-archive

      - name: Run unit tests with nextest (SQLite)
        env:
          DATABASE_URL: "sqlite::memory:"
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==
          TEST_DATABASE_TYPE: sqlite
        run: |
          cargo nextest run \
            --archive-file nextest-archive.tar.zst \
            --workspace-remap . \
            --profile ci \
            --no-fail-fast \
            --test-threads 4

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-test-results
          path: target/nextest/ci/
          retention-days: 7

  # ============================================
  # Backend Integration Tests (PostgreSQL)
  # Runs from the prebuilt archive — no recompilation.
  # ============================================
  backend-integration-test:
    name: Backend Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [backend-build-archive]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ampel
          POSTGRES_PASSWORD: ampel
          POSTGRES_DB: ampel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Download test archive
        uses: actions/download-artifact@v7
        with:
          name: nextest-archive

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U ampel; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          echo "PostgreSQL is ready!"

      - name: Setup test database
        env:
          PGPASSWORD: ampel
        run: |
          psql -h localhost -U ampel -d ampel_test -c "SELECT version();"
          echo "Database connection successful"

      - name: Run integration tests with nextest (PostgreSQL)
        env:
          DATABASE_URL: postgres://ampel:ampel@localhost:5432/ampel_test
          TEST_DATABASE_URL: postgres://ampel:ampel@localhost:5432
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==
          TEST_DATABASE_TYPE: postgres
          RUST_LOG: info
        run: |
          cargo nextest run \
            --archive-file nextest-archive.tar.zst \
            --workspace-remap . \
            --profile ci \
            --no-fail-fast \
            --test-threads 2

      - name: Verify database cleanup
        if: always()
        env:
          PGPASSWORD: ampel
        run: |
          echo "Checking for leftover test data..."
          TABLE_COUNT=$(psql -h localhost -U ampel -d ampel_test -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';")
          echo "Tables in database: $TABLE_COUNT"
          psql -h localhost -U ampel -d ampel_test -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          echo "Database cleaned up successfully"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-integration-test-results
          path: target/nextest/ci/
          retention-days: 7

  # ============================================
  # Backend Coverage Report (non-blocking, PRs only)
  # Coverage requires its own instrumented build, so it cannot reuse the
  # test archive. CARGO_PROFILE_TEST_DEBUG=0 keeps target/ small enough to
  # fit the runner disk (the previous disk-exhaustion root cause). If this
  # job ever hits ENOSPC again, add a free-disk-space step here.
  # ============================================
  backend-coverage:
    name: Backend Test Coverage
    runs-on: ubuntu-latest
    # Non-blocking and independent of lint, so it starts immediately.
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ampel
          POSTGRES_PASSWORD: ampel
          POSTGRES_DB: ampel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "coverage"

      - name: Generate coverage report
        env:
          DATABASE_URL: postgres://ampel:ampel@localhost:5432/ampel_test
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==
        run: |
          mkdir -p coverage
          cargo llvm-cov \
            --all-features \
            --workspace \
            --locked \
            --codecov \
            --output-path coverage/codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/codecov.json
          flags: backend
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-report
          path: coverage/
          retention-days: 7

  # ============================================
  # Frontend Validation & Linting
  # ============================================
  frontend-lint:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Check TypeScript
        run: pnpm run type-check

      - name: Check Prettier formatting
        run: pnpm exec prettier --check "src/**/*.{ts,tsx,css,json}"

  # ============================================
  # Frontend Security Checks
  # ============================================
  frontend-security:
    name: Frontend Security Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ============================================
  # Frontend Build & Test
  # ============================================
  frontend-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    needs: [frontend-lint]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test -- --run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

      - name: Build production bundle
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # ============================================
  # Detect which paths changed (drives conditional jobs)
  # ============================================
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'docker/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**/Cargo.toml'
              - 'frontend/package.json'
              - 'frontend/pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  # ============================================
  # Docker Build Validation
  # Validates the release images compile (no push). Runs on every push to a
  # protected branch, and on PRs ONLY when Docker-relevant files changed — so
  # code-only PRs skip it and keep the feedback loop short. Gated on tests.
  # ============================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-unit-test, backend-integration-test, frontend-test]
    if: github.event_name == 'push' || needs.detect-changes.outputs.docker == 'true'

    strategy:
      matrix:
        include:
          - dockerfile: docker/Dockerfile.api
            image: ampel-api
          - dockerfile: docker/Dockerfile.worker
            image: ampel-worker
          - dockerfile: docker/Dockerfile.frontend
            image: ampel-frontend
            build_args: VITE_API_URL=http://localhost:8080/api

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Docs Lint (markdownlint — sole docs authority)
  # ============================================
  docs-lint:
    name: Docs Lint (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run markdownlint
        run: pnpm run lint:md

  # ============================================
  # Summary Check
  # ============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [
      backend-lint,
      docs-lint,
      backend-security,
      backend-build-archive,
      backend-unit-test,
      backend-integration-test,
      frontend-lint,
      frontend-security,
      frontend-test,
      docker-build
    ]
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.docs-lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-security.result }}" != "success" ]] || \
             [[ "${{ needs.backend-build-archive.result }}" != "success" ]] || \
             [[ "${{ needs.backend-unit-test.result }}" != "success" ]] || \
             [[ "${{ needs.backend-integration-test.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-test.result }}" != "success" ]]; then
            echo "Some required jobs failed"
            exit 1
          fi
          echo "All required checks passed!"

      - name: Test Summary
        run: |
          echo "## CI Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend security (audit + deny): ${{ needs.backend-security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend unit tests (SQLite): ${{ needs.backend-unit-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend integration tests (PostgreSQL): ${{ needs.backend-integration-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Frontend tests: ${{ needs.frontend-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker builds: ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
