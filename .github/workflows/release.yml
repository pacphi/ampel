name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ampel

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ============================================
  # release-please: maintain Release PR; cut tag on merge
  # ============================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ============================================
  # Build and Push Docker Images
  # ============================================
  docker-release:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - dockerfile: docker/Dockerfile.api
            image: api
          - dockerfile: docker/Dockerfile.worker
            image: worker
          - dockerfile: docker/Dockerfile.frontend
            image: frontend
            build_args: VITE_API_URL=/api

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Build Release Binaries
  # ============================================
  binary-release:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin ampel-api

      - name: Package binary
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/ampel-api release/
          cd release
          tar -czvf ampel-api-${{ needs.release-please.outputs.version }}-${{ matrix.suffix }}.tar.gz ampel-api

      - name: Upload release artifact
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: release/ampel-api-${{ needs.release-please.outputs.version }}-${{ matrix.suffix }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Publish ampel-i18n-builder to crates.io
  # ============================================
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --package ampel-i18n-builder
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ============================================
  # Notify on Release
  # ============================================
  notify:
    name: Notify Release Complete
    runs-on: ubuntu-latest
    needs: [release-please, docker-release, binary-release, publish-crate]
    if: always() && needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Release Summary
        run: |
          echo "## Release ${{ needs.release-please.outputs.tag_name }} Complete!"
          echo ""
          echo "### Docker Images"
          echo "- ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ needs.release-please.outputs.tag_name }}"
          echo "- ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ needs.release-please.outputs.tag_name }}"
          echo "- ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.release-please.outputs.tag_name }}"
          echo ""
          echo "### Binaries"
          echo "Attached to GitHub Release ${{ needs.release-please.outputs.tag_name }}."
