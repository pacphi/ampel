name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing tag to build assets for (e.g. v0.5.1). Skips release-please.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ampel

# Serialize releases; never cancel an in-flight release (tags/images must not
# be left half-published).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ============================================
  # release-please: maintain Release PR; cut tag on merge
  # ============================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ inputs.tag_name != '' || steps.release.outputs.release_created }}
      tag_name: ${{ inputs.tag_name != '' && inputs.tag_name || steps.release.outputs.tag_name }}
      version: ${{ inputs.tag_name != '' && inputs.tag_name || steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        if: inputs.tag_name == ''
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ============================================
  # Build per-arch images on NATIVE runners (no QEMU emulation).
  # amd64 on ubuntu-latest, arm64 on the free public-repo ubuntu-24.04-arm
  # runner. Each build pushes by digest only; the docker-merge job below
  # assembles the multi-arch manifest and applies the semver tags.
  # Pattern: https://docs.docker.com/build/ci/github-actions/multi-platform/
  # ============================================
  docker-build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image: [api, worker, frontend]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: api
            dockerfile: docker/Dockerfile.api
          - image: worker
            dockerfile: docker/Dockerfile.worker
          - image: frontend
            dockerfile: docker/Dockerfile.frontend
            build_args: VITE_API_URL=/api

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Prepare platform pair
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker labels metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ============================================
  # Merge per-arch digests into a multi-arch manifest and tag it.
  # ============================================
  docker-merge:
    name: Merge ${{ matrix.image }} manifest
    runs-on: ubuntu-latest
    needs: [release-please, docker-build]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image: [api, worker, frontend]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker tags metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE_REF}@sha256:%s " *)

      - name: Inspect manifest
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}"

  # ============================================
  # Build Release Binaries
  # ============================================
  binary-release:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin ampel-api

      - name: Package binary
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/ampel-api release/
          cd release
          tar -czvf ampel-api-${{ needs.release-please.outputs.version }}-${{ matrix.suffix }}.tar.gz ampel-api

      - name: Upload release artifact
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: release/ampel-api-${{ needs.release-please.outputs.version }}-${{ matrix.suffix }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Publish ampel-i18n-builder to crates.io
  # ============================================
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --package ampel-i18n-builder
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ============================================
  # Notify on Release
  # ============================================
  notify:
    name: Notify Release Complete
    runs-on: ubuntu-latest
    needs: [release-please, docker-merge, binary-release, publish-crate]
    if: always() && needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Release Summary
        run: |
          echo "## Release ${{ needs.release-please.outputs.tag_name }} Complete!"
          echo ""
          echo "### Docker Images"
          echo "- ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ needs.release-please.outputs.tag_name }}"
          echo "- ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ needs.release-please.outputs.tag_name }}"
          echo "- ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.release-please.outputs.tag_name }}"
          echo ""
          echo "### Binaries"
          echo "Attached to GitHub Release ${{ needs.release-please.outputs.tag_name }}."
