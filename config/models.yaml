# Ampel Remediation — model catalog (the curated source of truth for *selectable*
# models in the Remediation "Model" tab).
#
# This file is parsed by crates/ampel-core/src/remediation/model_catalog.rs and
# embedded into the binary at build time. EVERY field is optional: entries are
# deserialized with serde defaults, so a partial or future-extended entry never
# breaks the catalog. Unknown provider keys are skipped (warned), not fatal.
#
# To add a model: drop a new entry under the right provider's `models:` list.
# Capability fields (modality, egress, output_contract, model kind, cost) are
# DERIVED from the provider kind when omitted — see CatalogModel::caps — and may
# be narrowed per-provider via `egress:`.
#
# Money fields are quoted strings parsed as exact Decimals (never f64 — ADR-008).

