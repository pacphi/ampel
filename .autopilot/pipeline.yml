feature_id: "issues-40-41-remediation-followups"
goal: "Document the remediation worker/sandbox env vars (#40) and translate the remediation i18n namespace across all 26 non-English locales (#41)."
spec: |
  Two independent GitHub issues, both follow-ups to the remediation subsystem (PR #39, now squash-merged into main):
    #40  https://github.com/pacphi/ampel/issues/40  — docs-only: add runtime-read AMPEL_*/METRICS_PORT/REMEDIATION_* env vars to .env.example.
    #41  https://github.com/pacphi/ampel/issues/41  — translation-only: translate the 231-key `remediation` namespace for all 26 non-English locales.

# The design corpus autopilot reads to UNDERSTAND the work before/while building.
references:
  prd:     "docs/planning/PRODUCT_SPEC.md"
  plan:    ""
  adr_dir: "docs/architecture/adr"
  ddd_dir: "docs/architecture/ddd"
  extra:
    - "docs/localization/SPECIFICATION.md"
    - "docs/localization/PROVIDER-CONFIGURATION.md"
    - "docs/localization/TRANSLATION_WORKFLOW.md"
    - "crates/ampel-i18n-builder/README.md"

# Branch model. trunk is NEVER merged autonomously — a human always merges the final PR.
trunk: main
base:  develop                     # recreated from main this session; exists on origin so CI fires on phase PRs

# Autonomy mode: pr_ci — branch -> PR -> CI -> bounded fix-loop -> squash-merge into base.
autonomy: pr_ci

fix_budget: 5

# Both phases are low blast radius (docs + data-only translation; no auth/merge/generated-code logic).
risk_phases: []

# ─────────────────────────────────────────────────────────────────────────────
# RUNTIME PREREQUISITE (read before orchestrate)
# Phase 1 calls `make i18n` which runs `cargo run ...` from the REPO ROOT; the builder's
# dotenvy::dotenv() loads ./.env (CWD), NOT crates/ampel-i18n-builder/.env. The translation
# provider keys therefore will NOT auto-load. Before running orchestrate, export them:
#     set -a; source crates/ampel-i18n-builder/.env; set +a
# System env vars take precedence in the builder, so this is sufficient. DeepL/Systran must stay
# unset (or be disabled per-call) so the provider router honors Google → OpenAI order.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# GENERATED by autopilot:plan — edit freely
# ─────────────────────────────────────────────────────────────────────────────
phases:
  - id: 0
    goal: "Issue #40 — document every remediation-introduced runtime env var in .env.example so a fresh `cp .env.example .env` runs the worker with no undocumented-config surprise."
    deliverables:
      - "A clearly-labelled `# --- Autonomous Remediation (worker/sandbox) ---` section in .env.example."
      - "Every AMPEL_*/METRICS_PORT/REMEDIATION_* var read at runtime in crates/ documented with: an inline purpose comment, its code default (or a REQUIRED marker), and enum/valid values where applicable (e.g. AMPEL_SANDBOX_RUNTIME=podman|docker)."
      - "Authoritative var set (verified from source, supersedes the issue's 6-row table): METRICS_PORT, AMPEL_MAX_CONCURRENT_REPOS, AMPEL_SANDBOX_RUNTIME (auto-detect), AMPEL_SANDBOX_IMAGE, AMPEL_CLONE_DEPTH (50), AMPEL_SUBPROCESS_TIMEOUT_SECS (300), plus the issue-missed REMEDIATION_SLACK_WEBHOOK_URL and REMEDIATION_SLACK_CHANNEL."
    definition_of_done:
      # Parity: every env var read in crates/ (via env::var OR the parse_env_* helpers) must appear in .env.example. Empty diff = pass.
      - "cmd: comm -23 <(grep -rhoE '(env::var|parse_env_u32|parse_env_u64)\\(\"(AMPEL_[A-Z_]+|METRICS_PORT|REMEDIATION_[A-Z_]+)\"' crates/ | grep -oE '(AMPEL_[A-Z_]+|METRICS_PORT|REMEDIATION_[A-Z_]+)' | sort -u) <(grep -oE '(AMPEL_[A-Z_]+|METRICS_PORT|REMEDIATION_[A-Z_]+)' .env.example | sort -u) produces NO output"
      - "grep: ^# --- Autonomous Remediation in .env.example (the section header exists)"
      - "grep: AMPEL_SANDBOX_RUNTIME and its 'podman|docker' valid values are documented in .env.example"
      - "grep:absent: a new doc file under docs/ — this is a .env.example-only change (Out of Scope: do not create new doc files)"
      - "prose: defaults written in .env.example match the code defaults (AMPEL_CLONE_DEPTH=50, AMPEL_SUBPROCESS_TIMEOUT_SECS=300, sandbox runtime auto-detect); REMEDIATION_SLACK_* documented as optional with the unset failure mode (Slack notifications disabled)."
    conventions: "Docs-only edit to .env.example. Do NOT change any default value or runtime behavior. Do NOT create new doc files (issue Out of Scope). The issue's `git diff main..develop` discovery command is now empty (develop was reset to main) — use the repo-wide grep above as the authoritative source instead."
    depends_on: []
    adrs:
      - "ADR-003-sandbox-isolation-podman"
      - "ADR-005-octopus-merge-subprocess-git"
    ddd: []

  - id: 1
    goal: "Issue #41 — translate the 231-key `remediation` i18n namespace for all 26 non-English locales using the ampel-i18n CLI (Google primary, OpenAI fallback), so no remediation value still equals its English source."
    deliverables:
      - "All 26 non-English frontend/public/locales/<lang>/remediation.json files translated (no value byte-identical to the English source)."
      - "i18next {{interpolation}} placeholders, plural forms, and ICU/format syntax preserved (not mangled by translation)."
      - "Key parity preserved: exactly 231 keys per locale, 0 missing / 0 extra (unchanged from current state)."
    definition_of_done:
      # The CLI has NO --all flag and REQUIRES --lang; loop over the 26 locales. --namespace scopes to remediation;
      # disabling deepl+systran makes the router honor Google -> OpenAI. Keys must be in the process env (see prerequisite note).
      - "cmd: for each non-English locale, `make i18n ARGS='translate --lang <code> --namespace remediation --detect-untranslated --disable-provider deepl --disable-provider systran'` exits 0 (all 26 succeed)"
      - "cmd: ! diff -q frontend/public/locales/de/remediation.json frontend/public/locales/en/remediation.json  (a translated locale now DIFFERS from English; sample de, also spot-check ja/ar/zh-CN/ru)"
      - "cmd: for each locale, jq 'keys|length' <lang>/remediation.json equals 231 (parity intact across all 26)"
      - "cmd: placeholder integrity — for each locale+key, the set of {{...}} tokens matches en/remediation.json (no dropped/garbled interpolation vars)"
      - "prose: RTL locales (ar, he) and CJK locales (ja, ko, zh-CN, zh-TW) render in the target script, not raw English — spot-checked on a few high-traffic keys."
    conventions: "Translation-only — NO code/plumbing changes (namespace is already registered and wired). MUST run with GOOGLE_API_KEY + OPENAI_API_KEY in the process env (source crates/ampel-i18n-builder/.env first — see the runtime prerequisite note). Verify the effective provider order is Google→OpenAI before the full run (`make i18n ARGS='translate --help'` / config doctor). The CI i18n-validation workflow independently re-checks parity/placeholders on the PR."
    depends_on: []
    adrs: []
    ddd: []
