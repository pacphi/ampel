feature_id: "playbooks-guidance"
goal: "Make the Remediation Playbook editor instructional — surface the embedded default as a documented, editable starting point, add field hints and 'what's possible' affordances (allowed fields/enums, the tool-ceiling rule), and give richer validation than parse/pass. Mirrors the model-catalog feature."
spec: |
  Today PlaybookEditor.tsx is effectively a raw YAML textarea: no schema/field reference, no
  starter template from the embedded default, no affordances for what's possible (the tool-ceiling
  concept, allowed fields, enums), and only parse-or-not validation. A user's only way to learn
  "what does a playbook look like and what can I do" is to read the embedded default YAML in the
  repo or ADR-006/007 — none of it is in the UI.

  Ground truth (from exploration):
    - Embedded default: crates/ampel-worker/playbooks/default.yaml (single built-in, rust-embed,
      ADR-006/007). Playbook schema (crates/ampel-worker/src/services/playbook.rs):
      version:u32(default), role:String(req), tasks:HashMap<String,{instructions}>(req),
      loop:{max_iterations:u32,max_seconds:u64,max_cost_usd:String-decimal}(req),
      tools_policy:{allowed:Vec<String>}(the CEILING), context_spec:{blocks:Vec<String>}(opt),
      output_contract:String(req), provider_overlays:HashMap<provider,{output_contract?,model?}>(opt).
      minijinja templates use ONLY trusted vars repo_full_name/base_branch/failure_class; untrusted
      CI data rides in separate context_blocks.
    - Tool-ceiling rule (ADR-006, security): clamp_tools() in playbook.rs is pure set intersection —
      an override may only REMOVE tools from the embedded/org ceiling, NEVER ADD. Enforced in
      playbook_resolver.rs resolve() after every resolution step.
    - API: crates/ampel-api/src/handlers/remediation_playbooks.rs — CRUD + POST /{id}/preview
      (renders the assembled prompt, NO model call; returns role, system_instruction,
      output_contract, allowed_tools after clamp). Create/update validate via Playbook::from_yaml
      → 422 on invalid. There is NO endpoint returning the embedded default.
    - Frontend: PlaybookEditor.tsx (raw YAML textarea; client-validates only non-empty
      id/name/content; per-row Validate/Preview). api/playbooks.ts, hooks/usePlaybooks.ts,
      types/playbook.ts. i18n namespace remediation:playbooks.
    - Pattern to mirror: the just-shipped model-catalog (docs/features/MODEL_CATALOG.md;
      handlers/model_catalog.rs; ModelAccountManager.tsx capability pills). No docs/features/PLAYBOOKS.md yet.

  i18n MUST be done via the ampel-i18n-builder `translate` util (real translations, not English
  placeholders): source crates/ampel-i18n-builder/.env, `translate --lang <L>` per locale,
  regenerate frontend/src/i18n/types.ts, and AFTER translating audit for the two known translator
  pitfalls — corrupted {{interpolation}} vars and mistranslated brand/proper nouns — and repair.

references:
  prd:     "docs/planning/PRODUCT_SPEC.md"
  plan:    ""
  adr_dir: "docs/architecture/adr"
  ddd_dir: "docs/architecture/ddd"
  extra:
    - "docs/architecture/adr/ADR-006-playbook-format-storage.md"
    - "docs/architecture/adr/ADR-007-model-provider-trait.md"
    - "crates/ampel-worker/playbooks/default.yaml"
    - "crates/ampel-worker/src/services/playbook.rs"
    - "crates/ampel-api/src/handlers/remediation_playbooks.rs"
    - "frontend/src/components/remediation/PlaybookEditor.tsx"
    - "docs/features/MODEL_CATALOG.md"

trunk: main
base:  develop
autonomy: pr_ci

fix_budget: 5

# Read-only endpoint + write-time validation; no merge/auth/exec blast radius.
risk_phases: []

phases:
  - id: 0
    goal: "Backend: expose the embedded default playbook over HTTP and give create/update schema-aware, field-path validation."
    deliverables:
      - "GET /api/remediation/playbooks/embedded → the parsed embedded default (read-only, PlaybookResponse-shaped) via the resolver's embedded_default_yaml(); registered in crates/ampel-api/src/routes/mod.rs next to the other playbook routes."
      - "Schema-aware validation on create/update (crates/ampel-worker/src/services/playbook.rs and/or the handler): assert required keys role, tasks (non-empty), loop.{max_iterations,max_seconds,max_cost_usd}, tools_policy, output_contract; output_contract is a known enum; provider_overlays keys are known provider kinds. Return 422 with a field path (e.g. 'loop.max_iterations') rather than a bare parse error."
    definition_of_done:
      - "cmd: cargo test -p ampel-api playbooks passes (embedded endpoint returns the default; create/update returns field-path 422s for missing/invalid fields)."
      - "cmd: cargo test -p ampel-worker playbook passes (schema validator unit tests)."
      - "cmd: cargo build --workspace succeeds; cargo clippy --workspace --all-targets --all-features -- -D warnings clean."
      - "cmd: make format-check passes."
      - "grep: /api/remediation/playbooks/embedded in crates/ampel-api/src/routes/mod.rs"
      - "prose: the tool-ceiling clamp and trusted-vars/untrusted-context split are unchanged; the new endpoint is read-only and applies the same ADR-006 resolution."
    conventions: "Mirror handlers/model_catalog.rs (GET embedded default) and the existing remediation_playbooks.rs DTOs. Money stays Decimal-as-string. No secrets in logs."
    depends_on: []
    adrs:  ["ADR-006-playbook-format-storage"]
    ddd:   ["RemediationPolicy aggregate", "Playbook"]

  - id: 1
    goal: "Frontend: load/duplicate the embedded default as a starting point and surface preview metadata, so users see a concrete playbook and what it grants."
    deliverables:
      - "PlaybookEditor 'Load built-in default' action: fetch GET .../embedded, prefill the form with a sanitized copy (fresh playbookId/name, cleared description, content = the default YAML)."
      - "'Duplicate to customize' on existing playbook rows (prefill the form from that playbook)."
      - "Surface the preview response metadata (allowedTools + outputContract + role) as pills/section on preview, mirroring ModelAccountManager capability pills."
      - "api/playbooks.ts + usePlaybooks.ts + types/playbook.ts extended for the embedded endpoint; new EN i18n keys under remediation:playbooks."
    definition_of_done:
      - "cmd: make test-frontend passes, incl. new vitest specs: 'Load built-in default' prefills the form from the embedded endpoint (mocked); duplicate prefills from a row; preview renders allowedTools/outputContract pills."
      - "cmd: make lint-frontend passes; make format-check passes."
      - "grep: playbooks/embedded in frontend/src/api/playbooks.ts"
      - "grep:absent: TODO|FIXME in frontend/src/components/remediation/PlaybookEditor.tsx"
    conventions: "TanStack Query + shadcn/ui as in the model-catalog work. Every string via i18n (EN only here; other locales in phase 2)."
    depends_on: [0]
    adrs:  ["ADR-006-playbook-format-storage"]
    ddd:   ["Playbook"]

  - id: 2
    goal: "Frontend: per-field schema reference/hints (including the tool-ceiling narrow-only rule and the trusted-vars/untrusted-context split) plus richer inline validation, fully internationalized."
    deliverables:
      - "Field hints/tooltips for each playbook field (role, tasks, loop budget, tools_policy CEILING with 'you may only narrow, never add', context_spec, output_contract enum, provider_overlays) — e.g. a PlaybookFieldHints module + help affordances next to the editor."
      - "Richer validation feedback: render the phase-0 field-path 422 errors inline against the offending field rather than a single generic message."
      - "i18n: all new remediation:playbooks.* keys translated into ALL 27 locales via the ampel-i18n-builder translate util; frontend/src/i18n/types.ts regenerated; post-translate audit repairs any corrupted {{interpolation}} vars and any mistranslated brand/proper nouns."
    definition_of_done:
      - "cmd: node scripts/i18n-coverage-report.js --check-missing reports no missing keys."
      - "cmd: node scripts/i18n-coverage-report.js --check --min-coverage 95 passes."
      - "cmd: make test-frontend passes (incl. a field-hint render + a field-path validation-error spec)."
      - "cmd: make lint-frontend passes; make format-check passes."
      - "prose: no raw i18n keys render; interpolation-variable audit across locales is clean; brand/proper nouns (Claude/Gemini/Ollama/ONNX, GitHub/GitLab/Bitbucket, Ampel) are not translated; types.ts regenerated in sync."
    conventions: "Use the ampel-i18n-builder translate flow (source its .env first). Run make format-check locally — Prettier is not covered by make lint. Protect interpolation vars + brand nouns (known translator pitfalls)."
    depends_on: [1]
    adrs:  ["ADR-006-playbook-format-storage"]
    ddd:   ["Playbook"]

  - id: 3
    goal: "Docs + end-to-end: document the playbook editing workflow and prove the guidance path with an integration test."
    deliverables:
      - "docs/features/PLAYBOOKS.md (mirror docs/features/MODEL_CATALOG.md): the schema and each field's meaning, the tool-ceiling narrow-only rule, the trusted-vars/untrusted-context split, the embedded default as the editable starting point, and the editing/validation/preview workflow."
      - "Integration test(s) in crates/*/tests/: GET .../embedded returns the default; an invalid playbook create returns a field-path 422; preview still renders with no model call."
    definition_of_done:
      - "cmd: make test passes (full backend + frontend)."
      - "cmd: make lint passes; make audit passes."
      - "grep: PLAYBOOKS.md in docs OR grep: Playbook in docs/features/PLAYBOOKS.md (doc exists)."
      - "prose: docs explain the tool-ceiling narrow-only rule and how to start from the embedded default, consistent with the implemented endpoints; markdownlint clean."
    conventions: "Markdown through the repo's markdownlint authority. Integration tests mirror crates/ampel-api/tests/test_model_catalog.rs (Postgres-gated)."
    depends_on: [2]
    adrs:  ["ADR-006-playbook-format-storage"]
    ddd:   ["Playbook"]
