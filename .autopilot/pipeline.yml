# ACTIVE pipeline — promoted from .autopilot/queued/ on run start (one active pipeline at a time).
# profile.yml is stack-level and shared — reused as-is.

feature_id: "app-version-footer"
goal: "Show the app version in the UI footer (bottom-left): the clean released version in production builds, and a SemVer pre-release form (e.g. v0.5.1-dev+<sha>) in dev to disambiguate development builds from releases."
spec: |
  Source of truth for the version is release-please: frontend/package.json `version` and the Cargo
  workspace `version` (both marked `# x-release-please-version`) are bumped together on release —
  currently 0.5.1. The frontend does NOT currently inject the version at build time (vite.config has no
  `define`), and there is NO footer component (layout is Header.tsx / Layout.tsx / Sidebar.tsx).
  Requirement: a footer, bottom-left preferred, that displays the version. Disambiguate dev vs release
  per SemVer best practice:
    - production build (`vite build`, import.meta.env.PROD): clean release version, e.g. "v0.5.1".
    - dev (`vite dev` / make dev-frontend, import.meta.env.DEV): a pre-release identifier, e.g.
      "v0.5.1-dev" or "v0.5.1-dev+<short-git-sha>" (prerelease per SemVer §9, sha as build metadata §10).
  Pre-release versions sort BELOW the release, which is the correct signal that a dev build is "ahead of
  but not yet" the next release.

references:
  prd:     "docs/planning/PRODUCT_SPEC.md"
  plan:    ""
  adr_dir: "docs/architecture/adr"
  ddd_dir: "docs/architecture/ddd"
  extra:
    - "frontend/vite.config.ts"
    - "frontend/src/components/layout/Layout.tsx"

trunk: main
base:  develop
autonomy: pr_ci
fix_budget: 5
risk_phases: []

phases:
  - id: 0
    goal: "Expose the app version to the frontend at build time, with a SemVer-correct dev/release distinction — no UI yet."
    deliverables:
      - "vite.config.ts `define` injects the package.json `version` (e.g. as `__APP_VERSION__`) and the short git SHA (e.g. `__GIT_SHA__`) at build time; reads version from package.json (the release-please source of truth), not a hardcoded literal."
      - "A small version helper (e.g. frontend/src/lib/version.ts) exporting a displayVersion() that returns `v<version>` when import.meta.env.PROD and `v<version>-dev+<sha>` (SemVer prerelease+build-metadata) when import.meta.env.DEV."
      - "Unit test (vitest) covering both PROD and DEV branches of displayVersion()."
    definition_of_done:
      - "grep: __APP_VERSION__ (or chosen token) defined in frontend/vite.config.ts via `define`, sourced from package.json version"
      - "cmd: cd frontend && pnpm run type-check passes"
      - "cmd: cd frontend && pnpm test -- --run src/lib/version (the helper's tests pass, covering PROD release form and DEV pre-release form)"
      - "grep:absent: a hardcoded version string literal like \"0.5.1\" in version.ts (must derive from the injected define, so release-please bumps flow through automatically)"
      - "prose: dev output is a valid SemVer pre-release (contains a `-dev` prerelease tag); prod output has no prerelease tag."
    conventions: "Match existing frontend conventions (TS, vitest co-located or __tests__). Derive version from package.json so release-please bumps require no manual edits here. Use import.meta.env.PROD/DEV for the mode switch. Keep the helper pure/testable; inject env via the define, don't read process.env at runtime."
    depends_on: []
    adrs: []
    ddd: []

  - id: 1
    goal: "Render the version in a footer (bottom-left) wired into the app layout."
    deliverables:
      - "A Footer component (frontend/src/components/layout/Footer.tsx) that renders displayVersion() bottom-left, styled subtly (muted, small) with Tailwind, consistent with Header/Sidebar."
      - "Footer wired into Layout.tsx so it appears app-wide at the bottom."
      - "Any user-facing label text (if added beyond the version string) uses an i18n key that EXISTS in en/<ns>.json (no raw keys — do not reintroduce the key-coverage bug); prefer showing just the version string to keep it label-light."
      - "Component test asserting the version string renders and is positioned in the footer."
    definition_of_done:
      - "grep: Footer rendered in frontend/src/components/layout/Layout.tsx"
      - "cmd: cd frontend && pnpm test -- --run Footer (component test passes, asserts version text present)"
      - "cmd: cd frontend && pnpm run build succeeds and `grep -r __APP_VERSION__ dist` finds NO unreplaced token (the define actually substituted)"
      - "cmd: cd frontend && pnpm exec prettier --check \"src/**/*.{ts,tsx,css,json}\" and pnpm run lint pass (the phase-2 docs-lint hard prettier gate is now active)"
      - "prose: footer appears bottom-left; in a dev run it shows the -dev pre-release form, in a prod build the clean version (visual confirmation)."
    conventions: "Bottom-left placement as requested. Keep it unobtrusive (muted foreground, small text). Reuse shadcn/Tailwind tokens already in the layout. If any label is added, add its i18n key to en first (lesson from i18n-key-coverage)."
    depends_on: [0]
    adrs: []
    ddd: []
