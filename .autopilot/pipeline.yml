# PARKED pipeline — not active. Promote to .autopilot/pipeline.yml only after the
# issues-40-41-remediation-followups run completes and is archived.
#   Convention:  .autopilot/queued/<id>.pipeline.yml   = planned but not running
#                .autopilot/pipeline.yml                = the single ACTIVE run
#                .autopilot/archive/<id>/pipeline.yml   = completed (git mv on finish)
# profile.yml is stack-level and shared — reused as-is by this feature.

feature_id: "docs-lint-consolidation"
goal: "Make markdownlint the single source of truth for docs linting, remove redundant prettier-on-markdown, drive markdownlint to green across all docs, and enforce it in CI."
spec: |
  Cleanup spun out of the issues-40-41 run. Root cause: TWO overlapping markdown mechanisms —
  markdownlint-cli2 (lint:md, config .markdownlint.json) AND prettier (`format`/`format:check`
  target "**/*.md", printWidth 100 via root .prettierrc). They fight, both are red locally, and
  NEITHER runs in CI. prettier-on-markdown is pure redundancy with markdownlint and is the sole
  source of the 43 "format-check" failures. markdownlint itself is also red (real content bugs).
  Decision: prettier owns code only; markdownlint owns docs; fix markdownlint; enforce in CI.
  Note: .github/workflows/check-links.yml already link-checks docs/** (excludes docs/.archives) —
  a separate concern; this feature does NOT touch it. Archives ARE in scope for markdownlint here.

references:
  prd:     ""
  plan:    ""
  adr_dir: "docs/architecture/adr"
  ddd_dir: "docs/architecture/ddd"
  extra: []

trunk: main
base:  develop
autonomy: pr_ci
fix_budget: 5

# Phase 2 edits CI itself (the gate) — modest meta-risk, so flag it for the heavier review pass.
risk_phases: [2]

phases:
  - id: 0
    goal: "De-duplicate the markdown toolchain: prettier no longer touches markdown; markdownlint becomes the sole docs authority. Zero documentation content changes."
    deliverables:
      - "Root package.json: `format`/`format:check` no longer run prettier on `**/*.md` (removed or repointed to markdownlint)."
      - "Makefile: `format-docs`/`format-check-docs` targets removed or repointed to markdownlint (lint:md / lint:md:fix); `format`/`format-check` aggregates updated accordingly."
      - "`**/*.md` added to root .prettierignore (belt-and-suspenders)."
    definition_of_done:
      - "grep:absent: prettier .*\\*\\*/\\*\\.md  in package.json (no prettier-on-markdown script remains)"
      - "grep: \\*\\*/\\*\\.md  (or *.md) present in .prettierignore"
      - "cmd: pnpm exec prettier --check \"**/*.md\" 2>&1 | grep -qiE 'No (matching )?files|matched' OR the format-check docs step is gone — prettier checks zero markdown"
      - "cmd: git diff --name-only develop -- 'docs/**/*.md' produces NO output (no doc content was reformatted in this phase)"
      - "prose: markdownlint is documented as the docs authority; prettier scope is code-only."
    conventions: "Config/script-only changes. Do NOT reformat or edit any .md content in this phase — that is Phase 1. Keep the diff to package.json, Makefile, .prettierignore."
    depends_on: []
    adrs: []
    ddd: []

  - id: 1
    goal: "Drive markdownlint to green across ALL markdown including docs/.archives — autofix the mechanical rules, hand-fix the real content bugs."
    deliverables:
      - "lint:md:fix applied (MD009 trailing spaces, MD012 multiple blanks, MD004 list-marker style, etc.)."
      - "Manual fixes for non-autofixable errors: MD056 malformed tables (ddd/domain-events.md, ddd/value-objects.md — extra cells), MD011 reversed-link syntax (archives), MD033 stray inline HTML, MD038 space-in-code-span (ddd/domain-services.md)."
      - "Archived docs under docs/.archives/** fixed too (in scope per decision)."
    definition_of_done:
      - "cmd: pnpm run lint:md exits 0 (markdownlint clean across all **/*.md)"
      - "cmd: make lint-docs passes"
      - "grep:absent: MD0[0-9][0-9]  in the output of `pnpm run lint:md` (no residual rule violations)"
      - "cmd: the check-links workflow's concern is unaffected — `git diff develop -- docs/` introduces no new broken relative links (spot-check the MD011 link fixes resolve to real anchors)"
      - "prose: MD056 tables in ddd/domain-events.md + value-objects.md render with correct column counts."
    conventions: "Prefer lint:md:fix for mechanical rules; hand-edit only what autofix can't. For MD056, fix the actual table (align cell counts to the header) — do not delete columns of real data. Preserve meaning."
    depends_on: [0]
    adrs: []
    ddd: []

  - id: 2
    goal: "Make it stick: enforce docs + frontend formatting in CI so this can't regress."
    deliverables:
      - "A markdownlint job/step in CI (ci.yml) running `pnpm run lint:md`, wired into the `ci-success` aggregator's needs."
      - "Frontend type files fixed: types/index.ts + types/remediation.ts conform to prettier (printWidth 100); the generated i18n/types.ts stays untouched (.prettierignore'd)."
      - "The `src` prettier step in ci.yml has `continue-on-error: true` removed (now a hard gate)."
    definition_of_done:
      - "grep: lint:md (or markdownlint) appears as a run step in .github/workflows/ci.yml"
      - "grep: the new docs-lint job name is listed under the `ci-success` job's `needs:`"
      - "grep:absent: continue-on-error: true  within the 'Check Prettier formatting' step block in ci.yml"
      - "cmd: cd frontend && pnpm exec prettier --check \"src/**/*.{ts,tsx,css,json}\" exits 0"
      - "cmd: pnpm run lint:md exits 0 (CI's new gate would pass on this branch)"
    conventions: "Match the existing ci.yml job style (runs-on ubuntu-latest, pnpm/action-setup, working-directory where needed). Add the docs-lint job's name to ci-success.needs so a red markdownlint actually blocks merge."
    depends_on: [1]
    adrs: []
    ddd: []
