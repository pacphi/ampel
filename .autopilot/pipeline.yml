      - "Two toggle controls rendered above the table (shadcn/ui, mirroring existing component usage), each labelled via i18n; toggling either widens the view."
      - "A distinct filtered-empty branch: when the fleet is non-empty but the filtered list is empty, render a 'no repos match the current filters' message with a control to clear/relax the filters (restore both defaults or show all). The existing zero-repos `remediation:fleet.empty` branch is unchanged."
