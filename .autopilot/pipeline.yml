feature_id: "fleet-overview-filters"
goal: "Make the Remediation Fleet Overview default to actionable repos: two independent, combinable toggle filters — 'only repos with open PRs' (openPrCount > 0) and 'only eligible repos' (eligible === true), both ON by default — each switchable to show all, with a distinct empty state when the filters hide every row."
spec: |
  Today FleetOverview.tsx renders `const fleet = rows ?? []` straight into the table, so every repo
  shows — including repos with zero open PRs and repos that are not remediation-eligible. Operators
  want the table to default to the rows they can act on, while still being able to widen the view.

  Two independent, combinable client-side toggle filters, both DEFAULT ON:
    1. "Only repos with open PRs" — keeps rows where `openPrCount > 0`.
    2. "Only eligible repos"      — keeps rows where `eligible === true`.
  Toggling either OFF widens the view; any combination is allowed (active filters AND together). When
  the fleet is non-empty but the active filters hide EVERY row, show a distinct "no repos match the
  current filters" empty state with an affordance to clear/relax the filters — separate from the
  existing "no repositories at all" (`remediation:fleet.empty`) state.

  Ground truth (from exploration):
    - FleetRow (frontend/src/types/remediation.ts): { repositoryId, name, openPrCount: number,
      eligible: boolean, policyState, airGapped }. The list from useFleetRemediation() ALREADY carries
      openPrCount and eligible, so this is PURELY client-side filtering — NO backend/API change.
    - FleetOverview.tsx (frontend/src/components/remediation/FleetOverview.tsx) keeps its existing
      loading / error / empty branches; add two boolean filter states (both default true), a derived
      filtered list, toggle controls rendered above the table (shadcn/ui — mirror existing component
      usage; a Switch or a toggled Button), and the new filtered-empty branch.
    - Tests: FleetOverview.test.tsx already exists (vitest; mocks useFleetRemediation via mockUseFleet;
      passthrough i18n where t() returns the key).
    - i18n: fleet strings live under `remediation:fleet` in public/locales/*/remediation.json (existing:
      title, description, tableLabel, error, empty, eligible, notEligible, airGappedOn, airGappedOff,
      preview, columns). New keys: the two toggle labels + the filtered-empty message (+ a clear/relax
      action label).

  i18n MUST be done via the ampel-i18n-builder `translate` util (real translations, not English
  placeholders): source crates/ampel-i18n-builder/.env, then a ZSH ARRAY loop
  `LANGS=(ar cs …); for L in $LANGS` (NEVER `for L in $string` — zsh will not word-split it and creates
  a bogus locale dir that generate-types then enumerates into types.ts). Regenerate
  frontend/src/i18n/types.ts (CI "Verify types are up-to-date" hard-fails on any drift) and, after
  translating, audit the two known translator pitfalls — corrupted {{interpolation}} vars and
  mistranslated brand/proper nouns — and repair.

