# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# This gate is BLOCKING in CI: any new advisory fails the build.
# The entries below are pre-existing, transitive advisories with no
# actionable fix available to us today. Each is documented with its
# source and an exit condition. Review on every dependency bump and
# remove an entry the moment a fixed upstream version lands.
ignore = [
    # rsa "Marvin Attack" timing sidechannel. No safe upgrade exists upstream.
    # Pulled transitively by jsonwebtoken's `rust_crypto` backend. Ampel signs
    # JWTs with HS256 and never instantiates an RSA key, so this code path is
    # never executed. The only rsa-free jsonwebtoken backend is `aws_lc_rs`,
    # which would add the aws-lc-sys C dependency; not worth it for dead code.
    # Remove when jsonwebtoken/rsa ship a mitigated release.
    "RUSTSEC-2023-0071",
    # bincode unmaintained. Transitive via ruvector-core -> hnsw_rs -> bincode.
    # Remove when the dependency chain drops bincode or it is re-adopted.
    "RUSTSEC-2025-0141",
    # number_prefix unmaintained. Transitive (progress-bar formatting).
    "RUSTSEC-2025-0119",
    # proc-macro-error2 unmaintained. Transitive proc-macro dependency.
    "RUSTSEC-2026-0173",
]

[licenses]
# Allow common open-source licenses used in the Rust ecosystem
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "BSL-1.0",
]
# Allow licenses that are used by dependencies but with stricter conditions
confidence-threshold = 0.8
# Clarify licenses for crates that cargo-deny can't determine automatically
clarify = []
# Handle exceptions for specific crates if needed
exceptions = []

[bans]
# Deny multiple versions of the same crate (helps reduce build times and binary size)
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Allow specific duplicate versions if needed
skip = []
skip-tree = []

[sources]
# Only allow crates from crates.io and our own git repos
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
